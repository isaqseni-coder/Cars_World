<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTOMOTO — World's Finest Cars</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #ececea;
    --text: #0a0a0a;
    --text2: #555;
    --text3: #888;
    --accent: #c8a96e;
    --accent2: #9b7d4a;
    --border: #e0e0dc;
    --card-bg: #ffffff;
    --card-shadow: 0 4px 40px rgba(0,0,0,0.08);
    --overlay: rgba(255,255,255,0.92);
    --nav-bg: rgba(255,255,255,0.96);
    --badge: #f0ece4;
    --badge-text: #7a5c2a;
    --transition: 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  [data-theme="dark"] {
    --bg: #0c0c0c;
    --bg2: #151515;
    --bg3: #1e1e1e;
    --text: #f0f0ee;
    --text2: #aaa;
    --text3: #666;
    --accent: #c8a96e;
    --accent2: #e8c98e;
    --border: #2a2a2a;
    --card-bg: #181818;
    --card-shadow: 0 4px 40px rgba(0,0,0,0.5);
    --overlay: rgba(12,12,12,0.95);
    --nav-bg: rgba(12,12,12,0.97);
    --badge: #2a2010;
    --badge-text: #c8a96e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: background var(--transition), color var(--transition);
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top:0; left:0; right:0; z-index:1000;
    background: var(--nav-bg);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    height: 68px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px;
    transition: background var(--transition), border-color var(--transition);
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 6px;
    color: var(--text);
    text-decoration: none;
    display: flex; align-items: center; gap: 10px;
  }
  .logo span { color: var(--accent); }
  .nav-right {
    display: flex; align-items: center; gap: 24px;
  }
  .cars-viewed {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 500; color: var(--text2);
    background: var(--badge);
    padding: 6px 14px; border-radius: 20px;
    transition: background var(--transition), color var(--transition);
  }
  .cars-viewed-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; color: var(--accent);
  }
  .lang-selector {
    position: relative;
  }
  .lang-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--badge); border: 1px solid var(--border);
    color: var(--text); padding: 7px 14px;
    border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500;
    transition: all var(--transition);
    font-family: 'DM Sans', sans-serif;
  }
  .lang-btn:hover { border-color: var(--accent); color: var(--accent); }
  .lang-dropdown {
    position: absolute; top: calc(100% + 8px); right: 0;
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    box-shadow: var(--card-shadow);
    min-width: 160px; opacity: 0; pointer-events: none;
    transform: translateY(-8px);
    transition: all 0.2s ease;
    z-index: 100;
  }
  .lang-dropdown.open { opacity: 1; pointer-events: all; transform: translateY(0); }
  .lang-item {
    padding: 10px 16px; cursor: pointer; font-size: 13px;
    display: flex; align-items: center; gap: 10px;
    transition: background 0.15s;
    color: var(--text);
  }
  .lang-item:hover { background: var(--bg2); color: var(--accent); }
  .lang-item.active { color: var(--accent); font-weight: 600; }
  .dark-toggle {
    width: 44px; height: 26px;
    background: var(--bg3); border-radius: 13px;
    position: relative; cursor: pointer;
    border: 1px solid var(--border);
    transition: background var(--transition);
    flex-shrink: 0;
  }
  .dark-toggle::after {
    content: ''; position: absolute;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent);
    top: 2px; left: 2px;
    transition: transform 0.25s ease, background 0.25s;
  }
  [data-theme="dark"] .dark-toggle::after { transform: translateX(18px); }
  .toggle-wrap { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text3); }

  /* ── HERO ── */
  .hero {
    margin-top: 68px;
    height: 520px;
    background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    text-align: center; position: relative; overflow: hidden;
    border-bottom: 1px solid var(--border);
  }
  .hero::before {
    content: 'AUTOMOTO';
    position: absolute; font-family: 'Bebas Neue';
    font-size: clamp(120px, 22vw, 280px);
    color: var(--border); letter-spacing: 20px;
    pointer-events: none; user-select: none;
    opacity: 0.5;
  }
  .hero-content { position: relative; z-index:2; }
  .hero-eyebrow {
    font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
    color: var(--accent); font-weight: 600; margin-bottom: 20px;
  }
  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(42px, 6vw, 88px);
    font-weight: 300; line-height: 1.05;
    color: var(--text); margin-bottom: 20px;
  }
  .hero-title em { font-style: italic; color: var(--accent); }
  .hero-sub {
    font-size: 16px; color: var(--text2); font-weight: 300; max-width: 480px;
    line-height: 1.6;
  }
  .hero-stats {
    display: flex; gap: 60px; margin-top: 48px; justify-content: center;
  }
  .hero-stat { text-align: center; }
  .hero-stat-num {
    font-family: 'Bebas Neue'; font-size: 42px; color: var(--accent); line-height:1;
  }
  .hero-stat-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text3); margin-top: 4px; }

  /* ── SEARCH ── */
  .search-section {
    padding: 40px 40px 0;
    max-width: 1400px; margin: 0 auto;
  }
  .search-bar {
    display: flex; gap: 12px; align-items: center;
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 16px; padding: 8px 8px 8px 24px;
    box-shadow: var(--card-shadow);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-bar:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200,169,110,0.15);
  }
  .search-bar input {
    flex:1; border:none; outline:none; background:transparent;
    font-size: 15px; color: var(--text); font-family: 'DM Sans';
  }
  .search-bar input::placeholder { color: var(--text3); }
  .search-btn {
    background: var(--accent); color: #fff;
    border: none; border-radius: 10px; padding: 10px 24px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: 'DM Sans'; letter-spacing: 0.5px;
    transition: background 0.2s;
  }
  .search-btn:hover { background: var(--accent2); }
  .filter-chips {
    display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap;
  }
  .chip {
    padding: 6px 18px; border-radius: 20px; font-size: 12px; font-weight: 600;
    letter-spacing: 0.5px; cursor: pointer; border: 1px solid var(--border);
    background: var(--card-bg); color: var(--text2);
    transition: all 0.2s;
  }
  .chip:hover, .chip.active { background: var(--accent); color:#fff; border-color: var(--accent); }

  /* ── BRANDS GRID ── */
  .section { max-width: 1400px; margin: 0 auto; padding: 60px 40px; }
  .section-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px; font-weight: 400; color: var(--text);
  }
  .section-sub { font-size: 13px; color: var(--text3); letter-spacing: 0.5px; }

  .brands-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }
  .brand-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 20px 20px;
    cursor: pointer;
    transition: all var(--transition);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .brand-card::before {
    content: ''; position: absolute; inset:0;
    background: linear-gradient(135deg, transparent 60%, rgba(200,169,110,0.06));
    opacity: 0; transition: opacity var(--transition);
  }
  .brand-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 60px rgba(200,169,110,0.15);
    border-color: var(--accent);
  }
  .brand-card:hover::before { opacity:1; }
  .brand-logo-wrap {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--bg2); margin: 0 auto 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    transition: transform 0.3s;
    border: 1px solid var(--border);
  }
  .brand-card:hover .brand-logo-wrap { transform: scale(1.1) rotate(3deg); }
  .brand-name {
    font-family: 'Bebas Neue'; font-size: 20px; letter-spacing: 3px;
    color: var(--text); margin-bottom: 4px;
  }
  .brand-origin { font-size: 11px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
  .brand-count { font-size: 11px; color: var(--accent); font-weight: 600; margin-top: 10px; }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    position: fixed; inset:0; z-index: 2000;
    background: var(--overlay);
    backdrop-filter: blur(12px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
    display: flex; align-items: flex-start;
    overflow-y: auto;
    padding: 80px 20px 40px;
  }
  .modal-overlay.open { opacity:1; pointer-events: all; }
  .modal {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 28px;
    max-width: 1100px; width: 100%;
    margin: auto;
    box-shadow: 0 40px 120px rgba(0,0,0,0.2);
    overflow: hidden;
    transform: translateY(30px);
    transition: transform 0.3s ease;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header {
    padding: 32px 40px 0;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); padding-bottom: 24px; margin-bottom: 0;
  }
  .modal-brand-name {
    font-family: 'Bebas Neue'; font-size: 40px; letter-spacing: 5px; color: var(--text);
  }
  .modal-close {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--bg2); border: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: var(--text2); transition: all 0.2s;
  }
  .modal-close:hover { background: var(--accent); color:#fff; }

  /* Cars list in modal */
  .modal-cars-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px; padding: 28px 40px 40px;
  }
  .car-card {
    border-radius: 18px; overflow: hidden;
    border: 1px solid var(--border);
    background: var(--bg2);
    cursor: pointer;
    transition: all var(--transition);
  }
  .car-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 50px rgba(200,169,110,0.18);
    border-color: var(--accent);
  }
  .car-img-wrap {
    height: 170px; overflow: hidden; position: relative;
    background: var(--bg3);
  }
  .car-img-wrap img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.5s ease;
  }
  .car-card:hover .car-img-wrap img { transform: scale(1.06); }
  .car-img-overlay {
    position: absolute; inset:0;
    background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 60%);
  }
  .car-img-badge {
    position: absolute; top: 10px; right: 10px;
    background: rgba(200,169,110,0.9); color:#fff;
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    font-weight: 700; padding: 4px 10px; border-radius: 10px;
  }
  .car-info { padding: 16px; }
  .car-model {
    font-family: 'Cormorant Garamond', serif; font-size: 22px;
    font-weight: 600; color: var(--text); margin-bottom: 4px;
  }
  .car-year { font-size: 12px; color: var(--text3); letter-spacing: 1px; }
  .car-price { font-size: 14px; color: var(--accent); font-weight: 600; margin-top: 6px; }
  .car-specs-preview {
    display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap;
  }
  .spec-mini {
    font-size: 11px; color: var(--text3); background: var(--badge);
    padding: 3px 10px; border-radius: 8px;
  }

  /* ── 3D VIEWER MODAL ── */
  .viewer-overlay {
    position: fixed; inset:0; z-index: 3000;
    background: rgba(0,0,0,0.97);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
    display: flex; flex-direction: column;
  }
  .viewer-overlay.open { opacity:1; pointer-events: all; }
  .viewer-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .viewer-car-name {
    font-family: 'Cormorant Garamond', serif; font-size: 28px;
    color: #fff; font-weight: 400;
  }
  .viewer-close {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
    color: #fff; width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; transition: background 0.2s;
  }
  .viewer-close:hover { background: var(--accent); }
  .viewer-body {
    flex:1; display: flex; overflow: hidden;
  }
  .viewer-3d {
    flex:1; position: relative;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    user-select: none;
  }
  .car-3d-container {
    position: relative;
    width: 600px; height: 380px;
    perspective: 1200px;
  }
  .car-3d-scene {
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.05s ease-out;
    position: relative;
  }
  .car-main-img {
    width: 100%; height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 30px 80px rgba(200,169,110,0.3));
    border-radius: 12px;
    pointer-events: none;
  }
  .viewer-hint {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    font-size: 12px; color: rgba(255,255,255,0.4);
    letter-spacing: 1px; display: flex; align-items: center; gap: 8px;
  }
  .viewer-hint-icon { font-size: 18px; }
  .ground-reflect {
    position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
    width: 80%; height: 40px;
    background: radial-gradient(ellipse, rgba(200,169,110,0.3) 0%, transparent 70%);
    filter: blur(10px);
  }
  /* Specs panel */
  .specs-panel {
    width: 380px;
    background: rgba(255,255,255,0.03);
    border-left: 1px solid rgba(255,255,255,0.06);
    overflow-y: auto; padding: 32px;
  }
  .specs-panel::-webkit-scrollbar { width: 4px; }
  .specs-panel::-webkit-scrollbar-thumb { background: rgba(200,169,110,0.3); border-radius: 2px; }
  .specs-title {
    font-family: 'Bebas Neue'; font-size: 22px; letter-spacing: 4px;
    color: var(--accent); margin-bottom: 24px;
  }
  .spec-group { margin-bottom: 28px; }
  .spec-group-title {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.3); margin-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 8px;
  }
  .spec-row {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    position: relative; gap: 20px;
  }
  .spec-row:last-child { border-bottom: none; }
  .spec-label {
    font-size: 12px; color: rgba(255,255,255,0.5); font-weight: 400; flex-shrink: 0;
    display: flex; align-items: center; gap: 8px;
  }
  .spec-line {
    flex:1; height: 1px; background: rgba(255,255,255,0.1);
    margin-top: 8px; min-width: 20px;
  }
  .spec-value {
    font-size: 13px; color: #fff; font-weight: 500; text-align: right;
  }
  .spec-unit { font-size: 10px; color: rgba(255,255,255,0.4); margin-left: 3px; }

  /* Color dots */
  .color-swatches { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .color-dot {
    width: 28px; height: 28px; border-radius: 50%;
    cursor: pointer; border: 2px solid rgba(255,255,255,0.1);
    transition: transform 0.2s, border-color 0.2s;
  }
  .color-dot:hover, .color-dot.active { transform: scale(1.2); border-color: var(--accent); }

  /* Rotation ring */
  .rotation-ring {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; align-items: center;
  }
  .ring-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.2); transition: background 0.2s;
  }
  .ring-dot.active { background: var(--accent); width: 20px; border-radius: 3px; }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    background: var(--bg2);
    padding: 40px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-logo { font-family:'Bebas Neue'; font-size: 24px; letter-spacing: 6px; color: var(--text3); }
  .footer-text { font-size: 12px; color: var(--text3); letter-spacing: 0.5px; }

  /* Responsive */
  @media(max-width:768px){
    nav { padding: 0 20px; }
    .section { padding: 40px 20px; }
    .modal-cars-grid { padding: 20px; gap: 14px; }
    .modal-header { padding: 20px 20px 16px; }
    .specs-panel { width: 100%; max-height: 300px; border-left: none; border-top: 1px solid rgba(255,255,255,0.06); }
    .viewer-body { flex-direction: column; }
    .car-3d-container { width: 340px; height: 220px; }
    .hero { height: 400px; }
    .hero-stats { gap: 30px; }
  }

  /* Loading skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* Fade in animation */
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(20px); }
    to { opacity:1; transform: translateY(0); }
  }
  .brand-card { animation: fadeUp 0.5s ease both; }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="logo" href="#">AUTO<span>MOTO</span></a>
  <div class="nav-right">
    <div class="cars-viewed">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/></svg>
      <span data-i18n="viewed">Cars Viewed</span>
      <span class="cars-viewed-count" id="viewedCount">0</span>
    </div>
    <div class="lang-selector">
      <button class="lang-btn" id="langBtn">
        <span id="currentLangFlag">🇺🇸</span>
        <span id="currentLangLabel">EN</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="lang-dropdown" id="langDropdown"></div>
    </div>
    <div class="toggle-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <div class="dark-toggle" id="darkToggle" title="Toggle dark mode"></div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <div class="hero-eyebrow" data-i18n="tagline">The World's Greatest Automobiles</div>
    <h1 class="hero-title">Drive Into <em>Perfection</em></h1>
